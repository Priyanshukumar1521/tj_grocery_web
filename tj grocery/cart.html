<!DOCTYPE html>
<html lang="en">
<head>
<title>Cart - TJ Glocery</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="index.html">TJ Glocery</a>
        </div>
    </nav>

    <div class="container mt-5">

        <h2>Your Shopping Cart 🛒</h2>

        <table class="table table-bordered mt-4">
            <thead class="table-success">
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Remove</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>Apple</td>
                    <td>₹120</td>
                    <td>
                        <input type="number" value="1" class="form-control" style="width:80px;">
                    </td>
                    <td>₹120</td>
                    <td><button class="btn btn-danger">X</button></td>
                </tr>

                <tr>
                    <td>Banana</td>
                    <td>₹60</td>
                    <td>
                        <input type="number" value="2" class="form-control" style="width:80px;">
                    </td>
                    <td>₹120</td>
                    <td><button class="btn btn-danger">X</button></td>
                </tr>

            </tbody>
        </table>

        <div class="text-end">
            <h4>Total: ₹240</h4>
            <a href="checkout.html" class="btn btn-success">Proceed to Checkout</a>
        </div>

    </div>

</body>
</html>

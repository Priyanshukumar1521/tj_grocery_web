<!DOCTYPE html>
<html lang="en">
<head>
<title>Checkout - TJ Glocery</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="index.html">TJ Glocery</a>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="row">

            <!-- Billing Details -->
            <div class="col-md-7">

                <div class="card p-4 shadow">

                    <h4>Billing Details</h4>

                    <form>

                        <div class="mb-3">
                            <label>Full Name</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Address</label>
                            <textarea class="form-control"></textarea>
                        </div>

                        <div class="mb-3">
                            <label>City</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Phone</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Payment Method</label>
                            <select class="form-control">
                                <option>Cash on Delivery</option>
                                <option>UPI</option>
                                <option>Card</option>
                            </select>
                        </div>

                        <button class="btn btn-success w-100">Place Order</button>

                    </form>

                </div>

            </div>


            <!-- Order Summary -->
            <div class="col-md-5">

                <div class="card p-4 shadow">

                    <h4>Order Summary</h4>

                    <p>Apple × 2</p>
                    <p>Banana × 1</p>

                    <hr>

                    <h5>Total: ₹300</h5>

                </div>

            </div>

        </div>

    </div>

</body>
</html>

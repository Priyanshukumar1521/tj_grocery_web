<!DOCTYPE html>
<html>
<head>
    <title>Checkout - TJ Grocery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 col-md-6">
    <h3 class="mb-4">Checkout</h3>

    <!-- Cart Summary -->
    <div class="card mb-4">
        <div class="card-header">
            <strong>Order Summary</strong>
        </div>
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="checkout-cart"></tbody>
            </table>
        </div>
        <div class="card-footer text-end">
            <strong>Total: ₹<span id="checkout-total">0</span></strong>
        </div>
    </div>

    <!-- Customer Form -->
    <form id="checkout-form">
        <input type="text" id="full-name" class="form-control mb-2" placeholder="Full Name" required>
        <input type="text" id="address" class="form-control mb-2" placeholder="Address" required>
        <input type="tel" id="phone" class="form-control mb-2" placeholder="Phone" required pattern="[0-9]{10}">
        
        <button type="submit" class="btn btn-success w-100">Place Order</button>
    </form>
</div>

<script>
    // Products from DB (you can pass from Django)
    const products = [
        {% for product in products %}
        {
            id: {{ product.id }},
            name: "{{ product.name|escapejs }}",
            price: {{ product.price }},
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ];

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function displayCheckoutCart(){
        const tbody = document.getElementById("checkout-cart");
        const totalSpan = document.getElementById("checkout-total");
        tbody.innerHTML = "";
        let total = 0;

        if(cart.length === 0){
            tbody.innerHTML = `<tr><td colspan="3" class="text-center">Cart is empty</td></tr>`;
            totalSpan.innerText = 0;
            return;
        }

        cart.forEach(item => {
            const product = products.find(p => p.id === item.id);
            if(!product) return;

            const rowTotal = product.price * item.qty;
            total += rowTotal;

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${product.name}</td>
                <td>${item.qty}</td>
                <td>₹${rowTotal.toFixed(2)}</td>
            `;
            tbody.appendChild(tr);
        });

        totalSpan.innerText = total.toFixed(2);
    }

    displayCheckoutCart();

    // Handle form submission
    document.getElementById("checkout-form").addEventListener("submit", function(e){
        e.preventDefault();

        // Get form values
        const name = document.getElementById("full-name").value.trim();
        const address = document.getElementById("address").value.trim();
        const phone = document.getElementById("phone").value.trim();

        if(!name || !address || !phone){
            alert("Please fill all fields!");
            return;
        }

        if(cart.length === 0){
            alert("Your cart is empty!");
            return;
        }

        // Normally here you would send data to server via AJAX
        const orderData = {
            customer: {name, address, phone},
            items: cart,
            total: document.getElementById("checkout-total").innerText
        };

        console.log("Order Placed:", orderData);

        alert("Order placed successfully!");

        // Clear cart
        localStorage.removeItem("cart");
        cart = [];
        displayCheckoutCart();
        this.reset();
    });
</script>

</body>
</html>

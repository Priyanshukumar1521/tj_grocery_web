<!DOCTYPE html>
<html>
<head>
    <title>Cart - TJ Grocery</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h3>Your Cart</h3>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cart-items"></tbody>
    </table>

    <h4>Total: ₹<span id="total">0</span></h4>
    <a href="{% url 'shop' %}" class="btn btn-primary">Continue Shopping</a>
</div>

<script>
    const products = [
        {% for product in products %}
        {
            id: {{ product.id }},
            name: "{{ product.name|escapejs }}",
            price: {{ product.price }},
            image: "{{ product.image.url }}",
            stock: {{ product.stock }},
            category: "{{ product.category.name|escapejs }}"
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ];

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function displayCart() {
        const cartItems = document.getElementById("cart-items");
        const totalSpan = document.getElementById("total");
        cartItems.innerHTML = "";
        let total = 0;

        if(cart.length === 0){
            cartItems.innerHTML = `<tr><td colspan="4" class="text-center">Cart is empty</td></tr>`;
            totalSpan.innerText = 0;
            return;
        }

        cart.forEach(item => {
            const product = products.find(p => p.id === item.id);
            if (!product) return;

            const rowTotal = product.price * item.qty;
            total += rowTotal;

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${product.name}</td>
                <td>
                    <input type="number" value="${item.qty}" min="1" class="form-control qty-input" data-id="${item.id}">
                </td>
                <td>₹${rowTotal.toFixed(2)}</td>
                <td>
                    <button class="btn btn-danger btn-sm remove-btn" data-id="${item.id}">Remove</button>
                </td>
            `;
            cartItems.appendChild(tr);
        });

        totalSpan.innerText = total.toFixed(2);

        document.querySelectorAll(".qty-input").forEach(input => {
            input.addEventListener("change", (e) => {
                const id = parseInt(e.target.dataset.id);
                const qty = parseInt(e.target.value);
                updateCart(id, qty);
            });
        });

        document.querySelectorAll(".remove-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(e.target.dataset.id);
                removeFromCart(id);
            });
        });
    }

    function updateCart(id, qty){
        cart = cart.map(item => item.id === id ? {...item, qty: qty} : item);
        localStorage.setItem("cart", JSON.stringify(cart));
        displayCart();
        updateCartCount();
    }

    function removeFromCart(id){
        cart = cart.filter(item => item.id !== id);
        localStorage.setItem("cart", JSON.stringify(cart));
        displayCart();
        updateCartCount();
    }

    function updateCartCount(){
        const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
        const badge = document.getElementById("cart-count");
        if(badge) badge.innerText = totalQty;
    }

    displayCart();
    updateCartCount();
</script>

</body>
</html>
